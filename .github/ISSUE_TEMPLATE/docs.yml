name: Documentation
description: Report unclear, missing, or incorrect documentation
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Where is the issue?
      description: Link to README, pkg.go.dev symbol, or file path (e.g. `docs/architecture.md`).
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording or fix
      description: Optional—paste improved text or outline.
